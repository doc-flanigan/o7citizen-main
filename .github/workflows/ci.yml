name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # The Next.js API route reads these at request time, not build time,
          # so dummy values are fine for CI — we just want the build to compile.
          RESEND_API_KEY: ci-build-dummy
          RESEND_AUDIENCE_ID: ci-build-dummy
          NEXT_PUBLIC_SITE_URL: https://dayonecitizen.com
          NEXT_PUBLIC_REFERRAL_URL: https://www.robertsspaceindustries.com/enlist?referral=STAR-GCQJ-N6NC
          NEXT_PUBLIC_HUB_URL: https://dayonecitizen.com
        run: npm run build
