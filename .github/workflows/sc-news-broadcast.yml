name: sc-news draft broadcast

# When a sc-news/* PR is merged into main, take the latest digest markdown
# and create a DRAFT broadcast in Resend. Doc reviews and clicks send in
# the Resend dashboard — the workflow never sends on its own.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      digest_file:
        description: "Path to the digest markdown file (defaults to newest in digests/)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: sc-news-broadcast-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  draft-broadcast:
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'sc-news/')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown-it
        run: npm install --no-save markdown-it@14

      - name: Pick the digest file
        id: pick
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.digest_file }}" ]; then
            FILE="${{ inputs.digest_file }}"
          else
            FILE=$(ls -t digests/*.md 2>/dev/null | head -1 || true)
          fi
          if [ -z "${FILE:-}" ] || [ ! -f "$FILE" ]; then
            echo "::error::No digest markdown file found at $FILE"
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          TITLE=$(grep -m1 '^# ' "$FILE" | sed 's/^# *//')
          if [ -z "$TITLE" ]; then
            TITLE="o7citizen weekly update"
          fi
          # Resend's broadcast endpoint appears to crash on UTF-8 subjects
          # (curly quotes, em-dashes, etc.), returning a generic 500
          # application_error. Transliterate to ASCII for the email subject
          # only — the page title on the site keeps the original typography.
          TITLE_ASCII=$(echo "$TITLE" | iconv -f UTF-8 -t ASCII//TRANSLIT 2>/dev/null || echo "$TITLE")
          echo "title=$TITLE_ASCII" >> "$GITHUB_OUTPUT"
          echo "Selected digest: $FILE"
          echo "Original title:  $TITLE"
          echo "ASCII subject:   $TITLE_ASCII"

      - name: Render digest to email HTML
        run: |
          node scripts/digest-to-email-html.mjs "${{ steps.pick.outputs.file }}" > /tmp/digest.html
          wc -c /tmp/digest.html

      - name: Create Resend draft broadcast
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          SUBJECT: ${{ steps.pick.outputs.title }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${RESEND_AUDIENCE_ID:-}" ]; then
            echo "::error::RESEND_API_KEY or RESEND_AUDIENCE_ID not set in repo secrets."
            exit 1
          fi
          # Strip any whitespace (including trailing newlines) that the GitHub
          # Secrets form may have preserved from a paste. Local shell
          # assignments auto-strip these, but the secret store doesn't —
          # leading to "Bearer key\n" headers that Resend rejects with a
          # generic 500 application_error instead of a useful 401.
          RESEND_API_KEY="$(printf '%s' "$RESEND_API_KEY" | tr -d '[:space:]')"
          RESEND_AUDIENCE_ID="$(printf '%s' "$RESEND_AUDIENCE_ID" | tr -d '[:space:]')"
          echo "API key length after whitespace strip: ${#RESEND_API_KEY}"
          echo "Audience id length after whitespace strip: ${#RESEND_AUDIENCE_ID}"
          FROM="${RESEND_FROM:-weekly@o7citizen.com}"
          FROM="$(printf '%s' "$FROM" | tr -d '[:space:]')"

          # Build a human-readable broadcast name for the Resend dashboard.
          # The "name" field is internal-only — different from "subject", which
          # is what subscribers see in their inbox. Pulled from the digest
          # filename so the dashboard list reads like:
          #   o7citizen weekly — 2026-04-27
          DIGEST_DATE=$(basename "${{ steps.pick.outputs.file }}" .md)
          BROADCAST_NAME="o7citizen weekly — $DIGEST_DATE"

          PAYLOAD=$(jq -n \
            --arg aud "$RESEND_AUDIENCE_ID" \
            --arg from "$FROM" \
            --arg subject "$SUBJECT" \
            --arg name "$BROADCAST_NAME" \
            --rawfile html /tmp/digest.html \
            '{audience_id: $aud, from: $from, subject: $subject, name: $name, html: $html}')

          # Capture both the response body and the HTTP status. -f would discard
          # the body on non-2xx, which hides Resend's actual error message.
          HTTP_CODE=$(curl -sS -o /tmp/resend-response.json -w "%{http_code}" \
            -X POST 'https://api.resend.com/broadcasts' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          if [ "$HTTP_CODE" -ge 400 ] 2>/dev/null || ! [ "$HTTP_CODE" -lt 300 ] 2>/dev/null; then
            echo "::error::Resend API returned HTTP $HTTP_CODE"
            echo ""
            echo "Request:"
            echo "  POST https://api.resend.com/broadcasts"
            echo "  from:        $FROM"
            echo "  audience_id: $RESEND_AUDIENCE_ID"
            echo "  subject:     $SUBJECT"
            echo ""
            echo "Response body:"
            cat /tmp/resend-response.json
            echo ""
            echo "## Broadcast creation failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- HTTP: \`$HTTP_CODE\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- From: \`$FROM\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Audience: \`$RESEND_AUDIENCE_ID\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Resend response:" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/resend-response.json >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          RESPONSE=$(cat /tmp/resend-response.json)
          BROADCAST_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$BROADCAST_ID" ]; then
            echo "::error::Resend did not return a broadcast id. Response: $RESPONSE"
            exit 1
          fi
          echo "Draft broadcast created: $BROADCAST_ID"
          echo "Review and send at: https://resend.com/broadcasts/$BROADCAST_ID"
          echo "## Draft broadcast created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Subject: \`$SUBJECT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- From: \`$FROM\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${{ steps.pick.outputs.file }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review and send: https://resend.com/broadcasts/$BROADCAST_ID" >> "$GITHUB_STEP_SUMMARY"
