name: sc-news draft broadcast

# When a sc-news/* PR is merged into main, take the latest digest markdown
# and create a DRAFT broadcast in Resend. Doc reviews and clicks send in
# the Resend dashboard — the workflow never sends on its own.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      digest_file:
        description: "Path to the digest markdown file (defaults to newest in digests/)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: sc-news-broadcast-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  draft-broadcast:
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'sc-news/')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown-it
        run: npm install --no-save markdown-it@14

      - name: Pick the digest file
        id: pick
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.digest_file }}" ]; then
            FILE="${{ inputs.digest_file }}"
          else
            FILE=$(ls -t digests/*.md 2>/dev/null | head -1 || true)
          fi
          if [ -z "${FILE:-}" ] || [ ! -f "$FILE" ]; then
            echo "::error::No digest markdown file found at $FILE"
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          TITLE=$(grep -m1 '^# ' "$FILE" | sed 's/^# *//')
          if [ -z "$TITLE" ]; then
            TITLE="o7citizen weekly update"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "Selected digest: $FILE"
          echo "Subject: $TITLE"

      - name: Render digest to email HTML
        run: |
          node scripts/digest-to-email-html.mjs "${{ steps.pick.outputs.file }}" > /tmp/digest.html
          wc -c /tmp/digest.html

      - name: Create Resend draft broadcast
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          SUBJECT: ${{ steps.pick.outputs.title }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${RESEND_AUDIENCE_ID:-}" ]; then
            echo "::error::RESEND_API_KEY or RESEND_AUDIENCE_ID not set in repo secrets."
            exit 1
          fi
          FROM="${RESEND_FROM:-weekly@o7citizen.com}"

          PAYLOAD=$(jq -n \
            --arg aud "$RESEND_AUDIENCE_ID" \
            --arg from "$FROM" \
            --arg subject "$SUBJECT" \
            --rawfile html /tmp/digest.html \
            '{audience_id: $aud, from: $from, subject: $subject, html: $html}')

          RESPONSE=$(curl -fsSL -X POST 'https://api.resend.com/broadcasts' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          BROADCAST_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$BROADCAST_ID" ]; then
            echo "::error::Resend did not return a broadcast id. Response: $RESPONSE"
            exit 1
          fi
          echo "Draft broadcast created: $BROADCAST_ID"
          echo "Review and send at: https://resend.com/broadcasts/$BROADCAST_ID"
          echo "## Draft broadcast created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Subject: \`$SUBJECT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- From: \`$FROM\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${{ steps.pick.outputs.file }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review and send: https://resend.com/broadcasts/$BROADCAST_ID" >> "$GITHUB_STEP_SUMMARY"
